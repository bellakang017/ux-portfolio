<svg xmlns="http://www.w3.org/2000/svg" width="500" height="280" viewBox="0 0 500 280">
  <rect width="500" height="280" fill="#FDF8F0" rx="8"/>

  <!-- Warm accent bar -->
  <rect x="0" y="0" width="500" height="4" fill="#C8956C" rx="2"/>

  <!-- Title -->
  <text x="40" y="60" font-family="Georgia, serif" font-size="28" fill="#2D2A26" font-weight="700" font-style="italic">Interview</text>
  <text x="40" y="92" font-family="Georgia, serif" font-size="28" fill="#C8956C" font-weight="700" font-style="italic">Instinct</text>

  <!-- Subtitle -->
  <text x="40" y="124" font-family="system-ui, sans-serif" font-size="12" fill="#8A8078">What is your interview animal?</text>

  <!-- 8 type circles -->
  <circle cx="60" cy="170" r="16" fill="#E8C9A0" opacity="0.6"/>
  <text x="60" y="174" text-anchor="middle" font-family="system-ui" font-size="16">🦁</text>

  <circle cx="105" cy="170" r="16" fill="#B8D4C8" opacity="0.6"/>
  <text x="105" y="174" text-anchor="middle" font-family="system-ui" font-size="16">🦊</text>

  <circle cx="150" cy="170" r="16" fill="#C9B8D4" opacity="0.6"/>
  <text x="150" y="174" text-anchor="middle" font-family="system-ui" font-size="16">🦉</text>

  <circle cx="195" cy="170" r="16" fill="#D4C0B0" opacity="0.6"/>
  <text x="195" y="174" text-anchor="middle" font-family="system-ui" font-size="16">🐬</text>

  <circle cx="240" cy="170" r="16" fill="#B8C8D4" opacity="0.6"/>
  <text x="240" y="174" text-anchor="middle" font-family="system-ui" font-size="16">🦅</text>

  <circle cx="285" cy="170" r="16" fill="#D4D0B8" opacity="0.6"/>
  <text x="285" y="174" text-anchor="middle" font-family="system-ui" font-size="16">🐝</text>

  <circle cx="330" cy="170" r="16" fill="#C8D4B8" opacity="0.6"/>
  <text x="330" y="174" text-anchor="middle" font-family="system-ui" font-size="16">🦋</text>

  <circle cx="375" cy="170" r="16" fill="#D4B8B8" opacity="0.6"/>
  <text x="375" y="174" text-anchor="middle" font-family="system-ui" font-size="16">🐢</text>

  <!-- Stats -->
  <text x="40" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#8A8078">24 scenarios</text>
  <text x="40" y="242" font-family="system-ui, sans-serif" font-size="11" fill="#8A8078">8 instinct types</text>

  <!-- Badge -->
  <rect x="340" y="230" width="120" height="24" rx="12" fill="none" stroke="#C8956C" stroke-width="1"/>
  <text x="400" y="246" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#C8956C">IWG Workshop</text>
</svg>
